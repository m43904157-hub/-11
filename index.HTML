    <style>
        .next-btn {
    display: inline-block;
    padding: 12px 24px;
    background-color: #2ecc71; /* لون الزر أخضر */
    color: white; /* لون الكتابة */

    border-radius: 8px; /* انحناء أطراف الزر */

}

.next-btn:hover {
    background-color: #27ae60; /* تغيير اللون عند مرور الماوس */
}

        /* تصميم الـ CSS */
        :root {
            --primary-color: #12c8f5;
            --secondary-color: #2c3e50;
            --background-color: #f5f7fa;
            --card-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
            color: var(--secondary-color);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            color: #7f8c8d;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .word-card {
            background-color: var(--card-color);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .word-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .english-word {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--secondary-color);
            margin-bottom: 10px;
            font-family: Arial, sans-serif;
        }

        .arabic-translation {
            font-size: 1.2rem;
            color: #7f8c8d;
            margin-bottom: 15px;
        }

        .sound-icon {
            background-color: #e8f4fd;
            color: var(--primary-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-size: 1.2rem;
            transition: background-color 0.2s;
        }

        .word-card:hover .sound-icon {
            background-color: var(--primary-color);
            color: white;
        }
    </style>
</head>

        const container = document.getElementById('wordsContainer');

        // توليد بطاقات الكلمات داخل الصفحة
        wordsList.forEach(item => {
            const card = document.createElement('div');
            card.className = 'word-card';
            // عند الضغط على الكارت يتم تشغيل دالة النطق
            card.onclick = () => speakWord(item.en);

            card.innerHTML = `
                <div class="english-word">${item.en}</div>
                <div class="arabic-translation">${item.ar}</div>
                <div class="sound-icon">🔊</div>
            `;
            
            container.appendChild(card);
        });

        // دالة نطق الكلمة بالإنجليزية
        function speakWord(text) {
            // إلغاء أي صوت يعمل حالياً لمنع التداخل
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; // ضبط اللهجة الإنجليزية الأمريكية
            utterance.rate = 0.9;     // التحكم في سرعة النطق (طبيعية)
            
            window.speechSynthesis.speak(utterance);
        }
